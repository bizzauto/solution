# IndiaCRM Nginx Configuration
# Place in /etc/nginx/sites-available/indiacrm
# Symlink: sudo ln -s /etc/nginx/sites-available/indiacrm /etc/nginx/sites-enabled/

upstream indiacrm_api {
server 127.0.0.1:4000;
keepalive 64;
}

server {
listen 80;
listen [::]:80;
server_name yourdomain.com www.yourdomain.com;

# Redirect to HTTPS
return 301 https://$server_name$request_uri;
}

server {
listen 443 ssl http2;
listen [::]:443 ssl http2;
server_name yourdomain.com www.yourdomain.com;

# SSL Configuration
ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers off;
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
add_header Strict-Transport-Security "max-age=63072000" always;

# Security Headers
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Gzip Compression
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

# Static Files
location /assets {
alias /var/www/indiacrm/client/assets;
expires 1y;
add_header Cache-Control "public, immutable";
}

# API Proxy
location /api/ {
proxy_pass http://indiacrm_api;
proxy_http_version 1.1;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection 'upgrade';
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_cache_bypass $http_upgrade;
proxy_read_timeout 90;
proxy_connect_timeout 90;
proxy_send_timeout 90;
proxy_body_size 10m;
}

# Health check endpoints (no auth required)
location /health {
proxy_pass http://indiacrm_api;
proxy_http_version 1.1;
proxy_set_header Host $host;
access_log off;
}

location /live {
proxy_pass http://indiacrm_api;
proxy_http_version 1.1;
proxy_set_header Host $host;
access_log off;
}

location /ready {
proxy_pass http://indiacrm_api;
proxy_http_version 1.1;
proxy_set_header Host $host;
access_log off;
}

# Frontend SPA
location / {
root /var/www/indiacrm/client;
index index.html;
try_files $uri $uri/ /index.html;
expires -1;
add_header Cache-Control "no-store, no-cache, must-revalidate";
}

# Deny access to sensitive files
location ~ /\. {
deny all;
}

location ~ ^/(\.env|package\.json|tsconfig) {
deny all;
return 404;
}
}